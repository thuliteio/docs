[build.environment]
  DART_SASS_VERSION = "1.97.3"
  GO_VERSION = "1.26.0"
  HUGO_VERSION = "0.164.0"
  NODE_VERSION = "24.18.0"
  NPM_VERSION = "11.16.0"
  TZ = "Europe/Amsterdam"

[build]
  publish = "public"
  command = """\
  git config core.quotepath false && \
  npm install && \
  hugo build --gc --minify --baseURL "${URL}" && \
  npx pagefind --site public
  """

[context.deploy-preview]
  command = """\
  git config core.quotepath false && \
  npm install && \
  hugo build --gc --minify --baseURL "$DEPLOY_PRIME_URL" && \
  npx pagefind --site public
  """

[context.branch-deploy]
  command = """\
  git config core.quotepath false && \
  npm install && \
  hugo build --gc --minify --baseURL "$DEPLOY_PRIME_URL" && \
  npx pagefind --site public
  """

[dev]
  framework = "#custom"
  command = "npm run dev"
  targetPort = 1313
  port = 8888
  publish = "public"
  autoLaunch = false

